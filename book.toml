[book]
title = "Qiskit for Curious Programmers"
authors = ["Tommy Chiang", "OpenAI Codex"]
language = "en"
description = "A beginner-friendly mdBook tutorial for learning Qiskit with small, QCoder-style exercises."

[build]
build-dir = "book"

[output.html]
default-theme = "light"
preferred-dark-theme = "light"
mathjax-support = true
git-repository-url = "https://github.com/oToToT/qiskit-learn"
site-url = "/qiskit-learn/"
